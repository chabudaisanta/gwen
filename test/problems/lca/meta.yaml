title: 根付き木の LCA
tags:
- graph
- tree_lca
timeout_sec: 2.0
description: '$N$ 頂点の根付き木が与えられます。頂点 $0$ が根です。

  $Q$ 個のクエリが与えられるので、各クエリについて頂点 $u$ と $v$ の最小共通祖先 (LCA) を求めてください。

  '
constraints: '- $1 \le N \le 500,000$

  - $1 \le Q \le 500,000$

  - $0 \le p_i < i$

  - $0 \le u_i, v_i < N$

  '
input_format: '$N \quad Q$

  $p_1 \quad p_2 \quad \dots \quad p_{N-1}$

  $u_0 \quad v_0$

  $u_1 \quad v_1$

  $\vdots$

  $u_{Q-1} \quad v_{Q-1}$

  '
output_format: '各クエリに対して、最小共通祖先の頂点番号を改行区切りで出力してください。

  '
samples:
- '01'
