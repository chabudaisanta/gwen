name: verify
on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write


jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install GCC 15
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15 libgtest-dev
      - name: Set up competitive-verifier
        uses: competitive-verifier/actions/setup@v2
        with:
          cache-pip: true
      - name: Resolve dependencies
        uses: competitive-verifier/actions/oj-resolve@v2
        with:
          output-path: verify_files.json
          config: config.toml
          exclude: test/**
      - name: Upload verify_files.json
        uses: competitive-verifier/actions/upload-verify-artifact@v2
        with:
          file: verify_files.json

  verify:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install GCC 15
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15 libgtest-dev
      - name: Download verify_files.json
        uses: competitive-verifier/actions/download-verify-artifact@v2
      - name: Set up competitive-verifier
        uses: competitive-verifier/actions/setup@v2
      - name: Verify
        uses: competitive-verifier/actions/verify@v2
        with:
          verify-files: verify_files.json
          destination: verify-result.json
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: verify-result.json

  docs:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Download result
        uses: actions/download-artifact@v4
        with:
          name: result
          path: .
      - name: Download verify_files.json
        uses: competitive-verifier/actions/download-verify-artifact@v2
      - name: Set up competitive-verifier
        uses: competitive-verifier/actions/setup@v2
      - name: Docs
        uses: competitive-verifier/actions/docs@v2
        with:
          verify-result: verify-*.json
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _gh_pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
