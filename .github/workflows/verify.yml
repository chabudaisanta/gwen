name: verify

on:
  push:
    branches:
      - main
      - rebuild-v2
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install competitive-verifier
        run: pip install competitive-verifier

      - name: Verify
        env:
          CPLUSINCLUDEPATH: ${{ github.workspace }}/include
        run: |
          competitive-verifier verify
