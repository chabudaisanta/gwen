name: verify

on:
  push:
    branches:
      - main
      - rebuild-v2
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install competitive-verifier
        run: pip install competitive-verifier

      - name: Verify
        env:
          CPLUSINCLUDEPATH: ${{ github.workspace }}/include
        run: |
          competitive-verifier verify --verify-json

      - name: Generate Docs
        if: github.event_name == 'push'
        env:
          CPLUSINCLUDEPATH: ${{ github.workspace }}/include
        run: |
          competitive-verifier docs

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_jekyll
